name: Publish NuGet

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Read current version
        id: version
        run: |
          current=$(grep -oP '(?<=<PackageVersion>)[^<]+' Flabbert.Clean.Template.csproj)
          IFS='.' read -r major minor patch <<< "$current"
          patch=${patch:-0}
          new_version="${major}.${minor}.$((patch + 1))"
          echo "version=$new_version" >> "$GITHUB_OUTPUT"
          echo "Version: $new_version"

      - name: Pack
        run: dotnet pack -c Release /p:PackageVersion=${{ steps.version.outputs.version }}

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: nuget-package
          path: bin/Release/*.nupkg

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: nuget-publish

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Download package
        uses: actions/download-artifact@v4
        with:
          name: nuget-package
          path: packages

      - name: Push to NuGet
        run: dotnet nuget push packages/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json

      - name: Update version in csproj
        run: |
          sed -i "s|<PackageVersion>.*</PackageVersion>|<PackageVersion>${{ needs.build.outputs.version }}</PackageVersion>|" Flabbert.Clean.Template.csproj

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Flabbert.Clean.Template.csproj
          git diff --cached --quiet || git commit -m "chore: bump version to ${{ needs.build.outputs.version }}"
          git push
